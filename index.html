<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DID:Ethr Manager · Gnosis Chain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #080a10;
  --surface:   #0d1018;
  --card:      #111520;
  --card2:     #161b27;
  --border:    #1e2535;
  --border2:   #2a3348;
  --text:      #dce3f0;
  --muted:     #5a6480;
  --accent:    #04c47a;
  --accent2:   #03a366;
  --accent-dim:#04c47a18;
  --accent-glow:0 0 24px #04c47a28;
  --blue:      #3b82f6;
  --red:       #f87171;
  --yellow:    #fbbf24;
  --white:     #f0f4ff;
  --radius:    14px;
  --radius-sm: 8px;
  --mono: 'DM Mono', monospace;
  --sans: 'Syne', sans-serif;
  --trans: 220ms cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
  opacity: 0.4;
}

/* ── Layout ─────────────────────────────────── */
.app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }

/* ── Header ─────────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 28px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, #04c47a22, #04c47a44);
  border: 1px solid #04c47a55;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px #04c47a22;
}
.logo-mark svg { width: 18px; height: 18px; }
.logo-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: var(--white); }
.logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.5px; font-family: var(--mono); }

.wallet-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 40px; font-family: var(--mono); font-size: 12px; color: var(--muted);
  transition: var(--trans);
}
.wallet-pill .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
}
.wallet-pill.connected .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }
.wallet-pill.wrong .dot { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── Cards ─────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 16px;
  transition: var(--trans);
}
.card-title {
  font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
}
.card-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── Wallet connect screen ─────────────────── */
.connect-screen {
  text-align: center; padding: 80px 40px;
}
.connect-screen h1 { font-size: 40px; font-weight: 800; letter-spacing: -1px; color: var(--white); margin-bottom: 12px; }
.connect-screen h1 span { color: var(--accent); }
.connect-screen p { color: var(--muted); max-width: 420px; margin: 0 auto 36px; font-family: var(--mono); font-size: 13px; line-height: 1.8; }

.wallet-list { display: flex; flex-direction: column; gap: 10px; max-width: 380px; margin: 0 auto; }
.wallet-btn {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: var(--sans); font-size: 15px; font-weight: 500; color: var(--text);
  transition: var(--trans); text-align: left; width: 100%;
}
.wallet-btn:hover { border-color: var(--accent); box-shadow: var(--accent-glow); color: var(--white); }
.wallet-btn img { width: 32px; height: 32px; border-radius: 8px; }
.wallet-btn .wallet-icon-placeholder {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--border2); display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.wallet-btn .wallet-name { flex: 1; }
.wallet-btn .wallet-arrow { color: var(--muted); font-size: 18px; }

/* ── Network warning ─────────────────────── */
.network-warn {
  background: #1a1500; border: 1px solid #3d2f00;
  border-radius: var(--radius); padding: 24px 28px;
  display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
}
.network-warn .icon { font-size: 28px; flex-shrink: 0; }
.network-warn h3 { font-size: 14px; font-weight: 600; color: var(--yellow); margin-bottom: 4px; }
.network-warn p { font-size: 13px; color: #b8a060; font-family: var(--mono); }

/* ── DID Banner ──────────────────────────── */
.did-banner {
  background: linear-gradient(135deg, #0a1a14, #091812);
  border: 1px solid #04c47a30;
  border-radius: var(--radius);
  padding: 24px 28px;
  margin-bottom: 24px;
  box-shadow: var(--accent-glow);
  position: relative; overflow: hidden;
}
.did-banner::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 180px; height: 180px; border-radius: 50%;
  background: radial-gradient(circle, #04c47a15 0%, transparent 70%);
}
.did-banner-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); font-family: var(--mono); margin-bottom: 8px; }
.did-banner-id {
  font-family: var(--mono); font-size: 13px; color: var(--white);
  word-break: break-all; line-height: 1.7; margin-bottom: 14px;
}
.did-banner-meta { display: flex; gap: 20px; flex-wrap: wrap; }
.did-meta-item { font-size: 12px; color: var(--muted); font-family: var(--mono); }
.did-meta-item span { color: var(--accent); margin-left: 4px; }

/* ── Tabs ─────────────────────────────────── */
.tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
.tab-btn {
  flex: 1; padding: 9px 12px;
  font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--muted);
  background: none; border: none; border-radius: 7px; cursor: pointer;
  transition: var(--trans); text-align: center;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--card2); color: var(--white); box-shadow: 0 1px 4px rgba(0,0,0,.4); }

/* ── Buttons ─────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 18px; border-radius: var(--radius-sm);
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  cursor: pointer; border: none; transition: var(--trans);
  text-decoration: none; white-space: nowrap;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover:not(:disabled) { background: #06e88e; box-shadow: 0 0 20px #04c47a44; }
.btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text); }
.btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: transparent; border: 1px solid #3d1515; color: var(--red); }
.btn-danger:hover:not(:disabled) { background: #1a0a0a; border-color: var(--red); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { padding: 7px; border-radius: var(--radius-sm); }

/* ── Forms ──────────────────────────────── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; font-family: var(--mono); }
.form-input {
  width: 100%; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: var(--mono); font-size: 13px;
  transition: var(--trans); outline: none;
}
.form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── Key Items ──────────────────────────── */
.key-item {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 12px;
  transition: var(--trans);
}
.key-item:hover { border-color: var(--border2); }
.key-item .key-icon {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-dim); border: 1px solid #04c47a22;
  font-size: 16px;
}
.key-item.danger .key-icon { background: #1a0a0a; border-color: #3d1515; }
.key-item .key-body { flex: 1; min-width: 0; }
.key-item .key-label { font-size: 12px; font-weight: 600; color: var(--white); margin-bottom: 2px; }
.key-item .key-val { font-family: var(--mono); font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.key-item .key-actions { display: flex; gap: 6px; flex-shrink: 0; }

/* ── Badge / Tag ─────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 8px; border-radius: 40px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; font-family: var(--mono);
}
.badge-green { background: #04c47a18; color: var(--accent); border: 1px solid #04c47a30; }
.badge-blue  { background: #3b82f618; color: var(--blue);   border: 1px solid #3b82f630; }
.badge-muted { background: var(--border); color: var(--muted); }
.badge-red   { background: #1a0a0a;   color: var(--red);    border: 1px solid #3d1515; }

/* ── JSON viewer ─────────────────────────── */
.json-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 20px;
  font-family: var(--mono); font-size: 12px; line-height: 1.9;
  overflow-x: auto; max-height: 480px; overflow-y: auto;
  white-space: pre; color: #8899bb;
}
.json-key   { color: #6eb3f0; }
.json-str   { color: #9ee4b0; }
.json-num   { color: #f4a64e; }
.json-bool  { color: #c084fc; }
.json-null  { color: var(--muted); }

/* ── Status bar ──────────────────────────── */
.status-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-family: var(--mono); font-size: 12px; margin-top: 12px;
}
.status-bar.error   { background: #1a0a0a; border: 1px solid #3d1515; color: var(--red); }
.status-bar.success { background: #081a10; border: 1px solid #0a3d1c; color: var(--accent); }
.status-bar.info    { background: var(--card2); border: 1px solid var(--border2); color: var(--muted); }

/* ── Spinner ─────────────────────────────── */
@keyframes spin { to{transform:rotate(360deg)} }
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid #04c47a44; border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
}

/* ── Section action row ──────────────────── */
.action-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

/* ── Divider ─────────────────────────────── */
.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* ── Owner section ───────────────────────── */
.owner-addr { font-family: var(--mono); font-size: 13px; color: var(--white); word-break: break-all; }
.warn-box {
  background: #100d00; border: 1px solid #3d2a00;
  border-radius: var(--radius-sm); padding: 16px;
  font-size: 13px; color: #c4974a; font-family: var(--mono);
  line-height: 1.7; margin-bottom: 16px;
}

/* ── Empty states ────────────────────────── */
.empty-state {
  text-align: center; padding: 48px 20px; color: var(--muted);
  font-family: var(--mono); font-size: 13px; line-height: 1.8;
}
.empty-state .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: .5; }

/* ── Scrollbar ───────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>
<did-manager></did-manager>
<script type="module" src="./js/did-manager.js"></script>
</body>
</html>
